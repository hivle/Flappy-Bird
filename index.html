<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Flappy Bird</title>
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>

  <body>
    <div id="game">
      <canvas id="canvas" width="400" height="600"></canvas>

      <div id="controls">
        <button id="pauseBtn" type="button" disabled>Pause</button>
        <button id="restartBtn" type="button">Restart</button>
      </div>

      <div id="overlay">
        <h1 id="overlayTitle">Flappy Bird</h1>
        <p id="overlaySubtitle">Space / click / tap to flap</p>
        <button id="actionBtn" type="button">Play</button>
      </div>
    </div>

    <script src="sketch.js?v=anim-v4-original-ish"></script>
  </body>
</html>
